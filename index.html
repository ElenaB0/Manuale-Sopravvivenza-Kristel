<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuale ufficiale per sopravvivere a Kristel</title>
 
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
}
 
section {
    margin: 40px auto;
    padding: 20px;
    max-width: 700px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
 
textarea {
    width: 80%;
    height: 100px;
    border-radius: 10px;
    padding: 10px;
}
 
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6b81;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
 
button:hover {
    background: #ff4757;
}
 
#output {
    margin-top: 20px;
    font-weight: bold;
    color: #333;
}
</style>
</head>
 
<body>
 
<section>
<h1>📖 Manuale ufficiale per sopravvivere a Kristel</h1>
</section>
 
<section>
<h2>✍️ Scrivi il tuo pensiero ufficiale</h2>
 
<textarea id="message" placeholder="Scrivi qui il tuo pensiero..."></textarea>
<br>
<button onclick="pubblica()">Pubblica pensiero</button>
 
<div id="output"></div>
</section>
 
<script>
function pubblica() {
    var testo = document.getElementById("message").value;
    if(testo.trim() === "") {
        alert("Non puoi lasciare il campo vuoto 😒");
        return;
    }
    document.getElementById("output").innerHTML =
        "💬 Pensiero ufficiale di Giulia:<br><br>\"" + testo + "\"";
}
</script>
 
</body>
</html>
